version: '3.8'
services:
  mongodb:
    image: mongo:6
    container_name: nexmonitor-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - nexmonitor-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexmonitor-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/nexmonitor
      - JWT_SECRET=your_jwt_secret_here
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - nexmonitor-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexmonitor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nexmonitor-network
    restart: unless-stopped

networks:
  nexmonitor-network:
    driver: bridge

volumes:
  mongo_data: